<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#B31C2C">
<title>ENTA Liste — Søren Knudsen A/S</title>
<style>
  :root{
    --sk-red:#B31C2C;
    --sk-red-dark:#8a1521;
    --sk-charcoal:#222629;
    --sk-charcoal-2:#2c3135;
    --sk-line:#3a4045;
    --sk-text:#e9ecef;
    --sk-text-dim:#9aa3ad;
    --sk-bg:#161a1d;
    --sk-card:#1f2428;
    --sk-card-2:#262c31;
    --sk-green:#4caf50;
    --sk-green-soft:rgba(76,175,80,.15);
    --sk-amber:#f0a500;
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--sk-bg);
    color:var(--sk-text);
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
    font-size:15px;
    line-height:1.45;
  }

  /* ---------- HEADER ---------- */
  header{
    background:linear-gradient(135deg,var(--sk-red) 0%,var(--sk-red-dark) 100%);
    color:#fff;
    padding:14px 16px 12px;
    padding-top:calc(14px + env(safe-area-inset-top));
    box-shadow:0 2px 12px rgba(0,0,0,.4);
    position:sticky;top:0;z-index:50;
  }
  header h1{
    margin:0;font-size:17px;font-weight:700;letter-spacing:.3px;
    display:flex;align-items:center;gap:8px;
  }
  header h1 .badge{
    background:rgba(255,255,255,.18);
    padding:2px 8px;border-radius:4px;
    font-size:11px;font-weight:600;letter-spacing:.5px;
  }
  header .sub{font-size:12px;opacity:.85;margin-top:2px}

  /* ---------- STATS ---------- */
  .stats{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:6px;padding:10px 12px;
    background:var(--sk-charcoal);
    border-bottom:1px solid var(--sk-line);
  }
  .stat{
    background:var(--sk-card);
    border-radius:8px;padding:8px 6px;
    text-align:center;border:1px solid var(--sk-line);
  }
  .stat .num{font-size:18px;font-weight:700;color:#fff;line-height:1}
  .stat .lbl{font-size:10px;color:var(--sk-text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .stat.done .num{color:var(--sk-green)}
  .stat.sk .num{color:var(--sk-red)}
  .stat.sv .num{color:var(--sk-amber)}

  /* ---------- TOOLBAR ---------- */
  .toolbar{
    background:var(--sk-charcoal);
    padding:8px 12px 10px;
    border-bottom:1px solid var(--sk-line);
    position:sticky;top:60px;z-index:40;
  }
  .search{
    width:100%;
    background:var(--sk-card);
    color:var(--sk-text);
    border:1px solid var(--sk-line);
    border-radius:8px;
    padding:10px 12px;font-size:15px;
    outline:none;
  }
  .search:focus{border-color:var(--sk-red)}
  .search::placeholder{color:var(--sk-text-dim)}

  .filters{
    display:flex;gap:6px;margin-top:8px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;
    background:var(--sk-card);
    color:var(--sk-text-dim);
    border:1px solid var(--sk-line);
    border-radius:20px;
    padding:6px 12px;font-size:12px;font-weight:600;
    cursor:pointer;white-space:nowrap;
    transition:all .15s;
  }
  .chip.active{
    background:var(--sk-red);color:#fff;border-color:var(--sk-red);
  }
  .chip.active.done-chip{background:var(--sk-green);border-color:var(--sk-green)}
  .chip.active.sv-chip{background:var(--sk-amber);border-color:var(--sk-amber);color:#000}

  /* ---------- LIST ---------- */
  .list{padding:8px 10px 80px}
  .item{
    background:var(--sk-card);
    border:1px solid var(--sk-line);
    border-radius:var(--radius);
    margin-bottom:6px;
    padding:10px 12px;
    display:grid;
    grid-template-columns:auto 1fr auto;
    gap:10px;align-items:center;
    transition:all .15s;
  }
  .item.done{
    background:var(--sk-green-soft);
    border-color:var(--sk-green);
    opacity:.85;
  }
  .item.done .num,.item.done .ref{text-decoration:line-through;opacity:.7}

  /* checkbox */
  .check{
    width:26px;height:26px;border-radius:6px;
    border:2px solid var(--sk-line);
    background:var(--sk-charcoal);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
    transition:all .15s;
  }
  .check.on{background:var(--sk-green);border-color:var(--sk-green)}
  .check.on::after{
    content:"";width:6px;height:11px;
    border:solid #fff;border-width:0 2.5px 2.5px 0;
    transform:rotate(45deg) translate(-1px,-1px);
  }

  .info .num{font-weight:700;font-size:16px;color:#fff;letter-spacing:.3px}
  .info .ref{font-size:12px;color:var(--sk-text-dim);margin-top:2px;font-family:"SF Mono",Menlo,monospace}
  .info .ref.empty{font-style:italic;opacity:.6}
  .info .meta{font-size:11px;color:var(--sk-text-dim);margin-top:3px}
  .info .amount{color:#fff;font-weight:600}

  /* type toggle */
  .type-toggle{
    display:flex;flex-direction:column;gap:3px;flex-shrink:0;
  }
  .type-btn{
    background:var(--sk-charcoal);
    color:var(--sk-text-dim);
    border:1px solid var(--sk-line);
    border-radius:5px;
    padding:3px 8px;font-size:10px;font-weight:700;
    cursor:pointer;letter-spacing:.5px;
    min-width:46px;text-align:center;
    transition:all .15s;
  }
  .type-btn.active.sk{background:var(--sk-red);color:#fff;border-color:var(--sk-red)}
  .type-btn.active.sv{background:var(--sk-amber);color:#000;border-color:var(--sk-amber)}

  /* ---------- BOTTOM BAR ---------- */
  .bottom{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--sk-charcoal);
    border-top:1px solid var(--sk-line);
    padding:8px 12px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    display:flex;gap:8px;z-index:60;
  }
  .btn{
    flex:1;background:var(--sk-card-2);
    color:var(--sk-text);
    border:1px solid var(--sk-line);
    border-radius:8px;
    padding:10px;font-size:13px;font-weight:600;
    cursor:pointer;
  }
  .btn.primary{background:var(--sk-red);color:#fff;border-color:var(--sk-red)}

  /* ---------- MODAL ---------- */
  .modal-bg{
    position:fixed;inset:0;
    background:rgba(0,0,0,.7);
    display:none;align-items:flex-end;justify-content:center;
    z-index:100;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--sk-charcoal);
    width:100%;max-width:500px;
    border-radius:14px 14px 0 0;
    padding:18px 16px;
    max-height:85vh;overflow-y:auto;
    border-top:3px solid var(--sk-red);
  }
  .modal h2{margin:0 0 12px;font-size:16px;color:#fff}
  .modal label{display:block;font-size:12px;color:var(--sk-text-dim);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  .modal .row{display:flex;gap:8px;margin-top:14px}
  .modal .btn{padding:11px}

  .empty{text-align:center;padding:40px 20px;color:var(--sk-text-dim)}
  .empty svg{opacity:.3;margin-bottom:10px}

  .toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:var(--sk-charcoal-2);color:#fff;
    padding:10px 18px;border-radius:8px;
    border:1px solid var(--sk-line);
    font-size:13px;font-weight:600;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
    z-index:200;opacity:0;transition:opacity .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <h1>ENTA Liste <span class="badge">SK A/S</span></h1>
  <div class="sub">Fiber - Kundestik Eftersalg Sinal m. blæs</div>
</header>

<div class="stats">
  <div class="stat"><div class="num" id="s-total">0</div><div class="lbl">I alt</div></div>
  <div class="stat done"><div class="num" id="s-done">0</div><div class="lbl">Færdig</div></div>
  <div class="stat sk"><div class="num" id="s-sk">0</div><div class="lbl">SK Enta</div></div>
  <div class="stat sv"><div class="num" id="s-sv">0</div><div class="lbl">SV Enta</div></div>
</div>

<div class="toolbar">
  <input class="search" id="search" placeholder="🔍 Søg på nr., reference eller konto…" autocomplete="off">
  <div class="filters" id="filters">
    <button class="chip active" data-filter="all">Alle</button>
    <button class="chip done-chip" data-filter="done">✓ Færdige</button>
    <button class="chip" data-filter="open">Åbne</button>
    <button class="chip" data-filter="sk">SK Enta</button>
    <button class="chip sv-chip" data-filter="sv">SV Enta</button>
    <button class="chip" data-filter="untyped">Ikke valgt</button>
  </div>
</div>

<div class="list" id="list"></div>

<div class="bottom">
  <button class="btn" onclick="exportCSV(false)">📋 Eksportér visning</button>
  <button class="btn primary" onclick="exportCSV(true)">✓ Kun færdige</button>
</div>

<!-- Reset modal -->
<div class="modal-bg" id="resetModal">
  <div class="modal">
    <h2>⚙️ Indstillinger</h2>
    <p style="color:var(--sk-text-dim);font-size:13px;margin:8px 0 14px">
      Data gemmes lokalt i din browser. Hvis du rydder browser-data eller bruger en anden enhed, starter du forfra.
    </p>
    <button class="btn" style="width:100%;margin-bottom:8px" onclick="resetAll()">🔄 Nulstil alle markeringer</button>
    <button class="btn" style="width:100%" onclick="closeModal()">Luk</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA — fra PDF (Søren Knudsen A/S, ENTA liste)
// SK = håndskrevet "SK" markering
// done = grøn markering på listen
// ============================================================
const SEED = [

  {nr:11981, ref:"",          konto:"9900100030", amt:4500},
  {nr:12003, ref:"000782M",   konto:"990010030",  amt:4500,   sk:true, done:true},

  {nr:12014, ref:"000786M",   konto:"990010030",  amt:301.54,           done:true},

  {nr:12017, ref:"1575274",   konto:"9900100030", amt:4500,   sk:true},

  {nr:12156, ref:"",          konto:"9900100030", amt:4500},
  {nr:12166, ref:"",          konto:"9900100028", amt:4500},
  {nr:12167, ref:"1582374",   konto:"9900100028", amt:1000},
  {nr:12182, ref:"1580150",   konto:"9900100028", amt:4500},
  {nr:12186, ref:"1580328",   konto:"9900100028", amt:301.54},
  {nr:12211, ref:"1570952",   konto:"9900100030", amt:4000},
  {nr:12255, ref:"1583916",   konto:"9900100028", amt:270},
  {nr:12282, ref:"1580352",   konto:"9900100028", amt:270},
  {nr:12327, ref:"543966",    konto:"9900100030", amt:270},
];

const STORAGE_KEY = "sk_enta_state_v1";
let state = {};   // { [nr]: { type:'sk'|'sv'|null, done:bool } }
let activeFilter = "all";
let searchTerm = "";

// --- LOAD / SAVE ---
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : {};
  }catch(e){ state = {}; }
  // første gang: seed fra PDF-markeringer
  let seeded = false;
  for(const it of SEED){
    if(!state[it.nr]){
      state[it.nr] = {
        type: it.sk ? "sk" : null,
        done: !!it.done
      };
      seeded = true;
    }
  }
  if(seeded) save();
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// --- RENDER ---
function fmt(n){
  if(Number.isInteger(n)) return n.toLocaleString("da-DK");
  return n.toLocaleString("da-DK",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function render(){
  const list = document.getElementById("list");
  const term = searchTerm.trim().toLowerCase();

  const visible = SEED.filter(it=>{
    const st = state[it.nr] || {};
    // search
    if(term){
      const hay = `${it.nr} ${it.ref} ${it.konto}`.toLowerCase();
      if(!hay.includes(term)) return false;
    }
    // filter
    switch(activeFilter){
      case "done":    return st.done;
      case "open":    return !st.done;
      case "sk":      return st.type==="sk";
      case "sv":      return st.type==="sv";
      case "untyped": return !st.type;
      default:        return true;
    }
  });

  if(!visible.length){
    list.innerHTML = `<div class="empty">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <div>Ingen poster matcher</div>
    </div>`;
  }else{
    list.innerHTML = visible.map(it=>{
      const st = state[it.nr] || {};
      const refTxt = it.ref ? it.ref : "(tom)";
      const refCls = it.ref ? "" : "empty";
      return `
      <div class="item ${st.done?'done':''}" data-nr="${it.nr}">
        <div class="check ${st.done?'on':''}" onclick="toggleDone(${it.nr})"></div>
        <div class="info">
          <div class="num">#${it.nr}</div>
          <div class="ref ${refCls}">${refTxt}</div>
          <div class="meta">Konto ${it.konto} · <span class="amount">${fmt(it.amt)} kr</span></div>
        </div>
        <div class="type-toggle">
          <button class="type-btn sk ${st.type==='sk'?'active':''}" onclick="setType(${it.nr},'sk')">SK</button>
          <button class="type-btn sv ${st.type==='sv'?'active':''}" onclick="setType(${it.nr},'sv')">SV</button>
        </div>
      </div>`;
    }).join("");
  }

  // stats (på hele datasættet, ikke filtreret)
  let total=SEED.length, done=0, sk=0, sv=0;
  for(const it of SEED){
    const st = state[it.nr] || {};
    if(st.done) done++;
    if(st.type==="sk") sk++;
    if(st.type==="sv") sv++;
  }
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-done").textContent = done;
  document.getElementById("s-sk").textContent = sk;
  document.getElementById("s-sv").textContent = sv;
}

// --- ACTIONS ---
function toggleDone(nr){
  if(!state[nr]) state[nr] = {type:null,done:false};
  state[nr].done = !state[nr].done;
  save(); render();
  if(state[nr].done) toast("✓ Markeret færdig");
}
function setType(nr, type){
  if(!state[nr]) state[nr] = {type:null,done:false};
  state[nr].type = (state[nr].type === type) ? null : type;
  save(); render();
}

function setFilter(f){
  activeFilter = f;
  document.querySelectorAll(".chip").forEach(c=>{
    c.classList.toggle("active", c.dataset.filter===f);
  });
  render();
}

// --- EXPORT ---
function exportCSV(onlyDone){
  const term = searchTerm.trim().toLowerCase();
  const rows = SEED.filter(it=>{
    const st = state[it.nr] || {};
    if(onlyDone && !st.done) return false;
    if(!onlyDone){
      // brug aktiv visning
      if(term){
        const hay = `${it.nr} ${it.ref} ${it.konto}`.toLowerCase();
        if(!hay.includes(term)) return false;
      }
      switch(activeFilter){
        case "done":    if(!st.done) return false; break;
        case "open":    if(st.done) return false; break;
        case "sk":      if(st.type!=="sk") return false; break;
        case "sv":      if(st.type!=="sv") return false; break;
        case "untyped": if(st.type) return false; break;
      }
    }
    return true;
  });

  if(!rows.length){ toast("Ingen rækker at eksportere"); return; }

  const header = ["Nr","Reference","Konto","Beløb","Type","Færdig"];
  const lines = [header.join(";")];
  for(const it of rows){
    const st = state[it.nr] || {};
    const type = st.type ? st.type.toUpperCase()+" ENTA" : "";
    lines.push([
      it.nr,
      it.ref || "",
      it.konto,
      String(it.amt).replace(".",","),
      type,
      st.done ? "Ja" : "Nej"
    ].join(";"));
  }
  const csv = "\uFEFF" + lines.join("\r\n"); // BOM så Excel læser æøå
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `enta-liste_${onlyDone?"faerdige":"visning"}_${stamp}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast(`📥 Eksporteret ${rows.length} rækker`);
}

// --- MODAL ---
function openModal(){ document.getElementById("resetModal").classList.add("show"); }
function closeModal(){ document.getElementById("resetModal").classList.remove("show"); }
function resetAll(){
  if(!confirm("Nulstil alle markeringer (færdig + SK/SV)? Dette kan ikke fortrydes.")) return;
  state = {};
  // genindlæs seed
  for(const it of SEED){
    state[it.nr] = { type: it.sk ? "sk" : null, done: !!it.done };
  }
  save(); render(); closeModal();
  toast("🔄 Nulstillet");
}

// --- TOAST ---
let toastTimer = null;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

// --- INIT ---
document.getElementById("search").addEventListener("input", e=>{
  searchTerm = e.target.value;
  render();
});
document.getElementById("filters").addEventListener("click", e=>{
  if(e.target.matches(".chip")) setFilter(e.target.dataset.filter);
});
// trippelt-klik på header-titlen åbner indstillinger
let tapCount=0,tapTimer=null;
document.querySelector("header h1").addEventListener("click",()=>{
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer=setTimeout(()=>{tapCount=0},600);
  if(tapCount>=3){ tapCount=0; openModal(); }
});

load();
render();
</script>
</body>
</html>
