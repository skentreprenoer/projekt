<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Kort — Søren Knudsen A/S</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050809;
  --s1:#0c1114;
  --s2:#131b21;
  --s3:#1a252d;
  --b1:#1e2d38;
  --b2:#2a3f4d;
  --tx:#d4dde5;
  --t2:#8a9bab;
  --t3:#56697a;
  --ac:#00d4aa;
  --ac2:#00b894;
  --acg:rgba(0,212,170,0.15);
  --w:#e8b230;
  --wg:rgba(232,178,48,0.12);
  --r:#e05252;
  --rg:rgba(224,82,82,0.12);
  --bl:#4a9eff;
  --blg:rgba(74,158,255,0.12);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}

/* ── BAR ── */
.bar{position:fixed;top:0;left:0;right:0;height:40px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 12px;z-index:900;gap:10px}
.bar-logo{font-weight:700;font-size:13px;color:var(--ac);letter-spacing:-.3px;white-space:nowrap}
.bar-sep{width:1px;height:18px;background:var(--b1)}
.bar-tabs{display:flex;gap:2px}
.bar-tab{padding:4px 10px;border-radius:4px;border:none;background:none;color:var(--t3);font:500 11px/1 'IBM Plex Sans',sans-serif;cursor:pointer;transition:.15s}
.bar-tab:hover{color:var(--t2)}
.bar-tab.on{background:var(--acg);color:var(--ac)}
.bar-stats{display:flex;gap:12px;margin-left:auto;font:500 11px/1 'IBM Plex Mono',monospace;color:var(--t2)}
.bar-stats span{display:flex;align-items:center;gap:4px}
.sd{width:6px;height:6px;border-radius:50%;display:inline-block}
.bar-clock{font:400 11px/1 'IBM Plex Mono',monospace;color:var(--t3);margin-left:8px}
.bar-refresh{background:none;border:1px solid var(--b1);color:var(--t3);padding:3px 8px;border-radius:3px;font:500 10px/1 'IBM Plex Sans',sans-serif;cursor:pointer;margin-left:4px;transition:.15s}
.bar-refresh:hover{border-color:var(--ac);color:var(--ac)}

/* ── MAP ── */
#map{position:fixed;top:40px;left:0;right:260px;bottom:0}
.leaflet-container{background:var(--bg)!important}
.leaflet-tile-pane{filter:brightness(0.55) contrast(1.15) saturate(0.2) hue-rotate(160deg) invert(1)}
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{background:var(--s2)!important;color:var(--t2)!important;border:1px solid var(--b1)!important;width:26px!important;height:26px!important;line-height:24px!important;font-size:14px!important}
.leaflet-control-attribution{display:none!important}

/* cluster overrides */
.marker-cluster{background:none!important}
.marker-cluster div{background:var(--s2)!important;color:var(--ac)!important;border:2px solid var(--ac)!important;font:600 11px/1 'IBM Plex Mono',monospace!important;border-radius:50%!important;width:36px!important;height:36px!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 0 12px rgba(0,212,170,0.25)!important}
.marker-cluster-small div{border-color:var(--bl)!important;color:var(--bl)!important;box-shadow:0 0 10px rgba(74,158,255,0.2)!important}
.marker-cluster-medium div{border-color:var(--w)!important;color:var(--w)!important;box-shadow:0 0 12px rgba(232,178,48,0.2)!important;width:40px!important;height:40px!important;font-size:12px!important}
.marker-cluster-large div{border-color:var(--r)!important;color:var(--r)!important;box-shadow:0 0 14px rgba(224,82,82,0.25)!important;width:46px!important;height:46px!important;font-size:13px!important}

/* ── PINS ── */
.mk{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);cursor:pointer;transition:transform .15s;box-shadow:0 1px 6px rgba(0,0,0,0.5)}
.mk:hover{transform:scale(1.5);z-index:9999!important}
.mk-a{background:var(--ac)}
.mk-p{background:var(--bl)}
.mk-w{background:var(--w)}
.mk-i{background:var(--r);animation:blink 1.5s infinite}
@keyframes blink{50%{opacity:.5}}

/* leaflet tooltip */
.lt{background:var(--s2)!important;border:1px solid var(--b2)!important;border-radius:5px!important;padding:5px 8px!important;box-shadow:0 4px 14px rgba(0,0,0,0.5)!important;color:var(--tx)!important;font:400 11px/1.3 'IBM Plex Sans',sans-serif!important}
.leaflet-tooltip-top::before{border-top-color:var(--s2)!important}

/* ── SIDEBAR ── */
.sb{position:fixed;top:40px;right:0;bottom:0;width:260px;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;z-index:800}
.sb-top{padding:8px;border-bottom:1px solid var(--b1);display:flex;gap:4px}
.sb-q{flex:1;padding:6px 8px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--tx);font:400 11px/1 'IBM Plex Sans',sans-serif}
.sb-q:focus{outline:none;border-color:var(--ac)}
.sb-q::placeholder{color:var(--t3)}
.sb-count{padding:4px 8px;font:500 10px/1 'IBM Plex Mono',monospace;color:var(--t3);border-bottom:1px solid var(--b1)}
.sb-list{flex:1;overflow-y:auto;padding:2px 4px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.si{padding:6px 8px;border-radius:4px;cursor:pointer;transition:.12s;display:flex;align-items:flex-start;gap:6px;border:1px solid transparent;margin-bottom:1px}
.si:hover{background:var(--s2);border-color:var(--b1)}
.si-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.si-info{min-width:0}
.si-t{font-size:11px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-s{font-size:9px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MODAL ── */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;display:none;align-items:center;justify-content:center}
.mo-bg.open{display:flex}
.mo{background:var(--s1);border:1px solid var(--b2);border-radius:10px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.7);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:none}}
.mo::-webkit-scrollbar{width:3px}
.mo::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.mo-h{padding:14px 16px 10px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:flex-start}
.mo-title{font-size:15px;font-weight:700;line-height:1.25;flex:1}
.mo-x{width:24px;height:24px;border-radius:4px;background:var(--s2);border:1px solid var(--b1);color:var(--t3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;margin-left:8px}
.mo-x:hover{background:var(--rg);color:var(--r);border-color:var(--r)}

.mo-b{padding:12px 16px 16px}

.mo-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font:600 10px/1 'IBM Plex Sans',sans-serif}
.mo-badge.g{background:var(--acg);color:var(--ac)}
.mo-badge.b{background:var(--blg);color:var(--bl)}
.mo-badge.y{background:var(--wg);color:var(--w)}
.mo-badge.r{background:var(--rg);color:var(--r)}

.mo-acts{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:12px 0}
.mo-act{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;cursor:pointer;transition:.15s}
.mo-act:hover{border-color:var(--ac);background:var(--s3)}
.mo-act span:first-child{font-size:16px}
.mo-act span:last-child{font:600 9px/1 'IBM Plex Sans',sans-serif;color:var(--t3)}

.mo-tabs{display:flex;gap:1px;background:var(--bg);border-radius:5px;padding:2px;margin-bottom:10px}
.mt{flex:1;padding:5px 4px;border-radius:4px;border:none;background:none;color:var(--t3);cursor:pointer;font:600 10px/1 'IBM Plex Sans',sans-serif;transition:.15s;text-align:center}
.mt.on{background:var(--s3);color:var(--tx)}
.mt:hover:not(.on){color:var(--t2)}
.tc{display:none}.tc.on{display:block}

.mo-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
.mm{background:var(--s2);border-radius:5px;padding:7px 10px}
.mm-l{font:500 9px/1 'IBM Plex Sans',sans-serif;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.mm-v{font:500 12px/1.2 'IBM Plex Sans',sans-serif}

.mo-lbl{font:600 11px/1 'IBM Plex Sans',sans-serif;color:var(--t2);margin-bottom:4px}
.mo-ta{width:100%;min-height:70px;padding:8px;background:var(--s2);border:1px solid var(--b1);border-radius:5px;color:var(--tx);font:400 12px/1.5 'IBM Plex Sans',sans-serif;resize:vertical}
.mo-ta:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px var(--acg)}

.cl{list-style:none;margin:6px 0}
.cl li{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:3px;font-size:11px;cursor:pointer;transition:.1s}
.cl li:hover{background:var(--s2)}
.cl li input{accent-color:var(--ac);width:14px;height:14px;cursor:pointer}
.cl li.dn{text-decoration:line-through;color:var(--t3)}
.cl-add{display:flex;gap:4px;margin-top:4px}
.cl-inp{flex:1;padding:5px 7px;background:var(--s2);border:1px solid var(--b1);border-radius:3px;color:var(--tx);font:400 11px/1 'IBM Plex Sans',sans-serif}
.cl-inp:focus{outline:none;border-color:var(--ac)}
.cl-btn{padding:5px 10px;border-radius:3px;border:none;background:var(--ac);color:var(--bg);font:600 10px/1 'IBM Plex Sans',sans-serif;cursor:pointer}

.tl{margin:6px 0}
.tl-e{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1)}
.tl-e:last-child{border:none}
.tl-t{font:400 9px/1 'IBM Plex Mono',monospace;color:var(--t3);min-width:60px;padding-top:1px}
.tl-x{font-size:11px;color:var(--t2);line-height:1.3}

.st-row{display:flex;gap:4px;margin:8px 0;flex-wrap:wrap}
.st-o{padding:5px 10px;border-radius:4px;border:1px solid var(--b1);background:var(--s2);color:var(--t3);font:600 10px/1 'IBM Plex Sans',sans-serif;cursor:pointer;transition:.15s}
.st-o:hover{border-color:var(--ac);color:var(--tx)}
.st-o.sel{border-color:var(--ac);background:var(--acg);color:var(--ac)}

.mo-f{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;padding-top:10px;border-top:1px solid var(--b1)}
.mo-btn{padding:6px 14px;border-radius:5px;border:none;font:600 11px/1 'IBM Plex Sans',sans-serif;cursor:pointer;transition:.15s}
.mo-save{background:var(--ac);color:var(--bg)}.mo-save:hover{background:var(--ac2)}
.mo-can{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}.mo-can:hover{color:var(--tx)}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--ac);color:var(--bg);padding:6px 16px;border-radius:5px;font:600 11px/1 'IBM Plex Sans',sans-serif;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

.ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
.ld.out{opacity:0;pointer-events:none}
.ld-s{width:28px;height:28px;border-radius:50%;border:2px solid var(--b1);border-top-color:var(--ac);animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld p{margin-top:10px;color:var(--t3);font-size:11px}
</style>
</head>
<body>

<div class="ld" id="ld"><div class="ld-s"></div><p>Indlæser...</p></div>
<div class="toast" id="toast"></div>

<div class="bar">
  <div class="bar-logo">SK KORT</div>
  <div class="bar-sep"></div>
  <div class="bar-tabs" id="tabs">
    <button class="bar-tab on" data-t="all">Alle</button>
    <button class="bar-tab" data-t="DSO">DSO</button>
    <button class="bar-tab" data-t="Norlys">Norlys</button>
    <button class="bar-tab" data-t="BB">BB-pulje</button>
    <button class="bar-tab" data-t="Erhverv">Erhverv</button>
  </div>
  <div class="bar-stats" id="bstats"></div>
  <div class="bar-clock" id="clk"></div>
  <button class="bar-refresh" onclick="boot()">↻</button>
</div>

<div id="map"></div>

<div class="sb">
  <div class="sb-top"><input class="sb-q" id="sq" placeholder="Søg..." oninput="draw()"></div>
  <div class="sb-count" id="scount"></div>
  <div class="sb-list" id="slist"></div>
</div>

<div class="mo-bg" id="mobg" onclick="if(event.target===this)cModal()">
  <div class="mo" id="mopanel"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ═══ STATE ═══
let map,cluster,ALL=[],TAB='all',CUR=null;
let S=JSON.parse(localStorage.getItem('skm')||'{}');
const sv=()=>localStorage.setItem('skm',JSON.stringify(S));
const gs=id=>{if(!S[id])S[id]={n:'',ck:[],lg:[],st:null};return S[id]};

// ═══ GEOCODE — 130+ byer ═══
const C={
'holstebro':[56.357,8.616],'herning':[56.137,8.977],'viborg':[56.453,9.402],'silkeborg':[56.169,9.546],
'skive':[56.568,9.030],'struer':[56.490,8.584],'lemvig':[56.548,8.310],'ringkøbing':[56.090,8.241],
'ikast':[56.138,9.157],'brande':[55.951,9.123],'thyborøn':[56.706,8.217],'hvide sande':[56.003,8.128],
'ulfborg':[56.265,8.319],'vinderup':[56.489,8.770],'vildbjerg':[56.218,8.769],'aulum':[56.259,8.836],
'kibæk':[56.032,8.914],'videbæk':[56.083,8.628],'tarm':[55.909,8.518],'skjern':[55.948,8.496],
'sunds':[56.212,8.977],'karup':[56.311,9.170],'bjerringbro':[56.378,9.660],'kjellerup':[56.289,9.426],
'nørre snede':[55.964,9.411],'give':[55.850,9.233],'billund':[55.731,9.114],'grindsted':[55.758,8.924],
'varde':[55.620,8.482],'esbjerg':[55.473,8.459],'ribe':[55.328,8.771],'vejen':[55.483,9.137],
'kolding':[55.493,9.476],'vejle':[55.709,9.536],'horsens':[55.862,9.850],'skanderborg':[56.037,9.928],
'aarhus':[56.157,10.211],'randers':[56.461,10.036],'aalborg':[57.049,9.922],'thisted':[56.957,8.694],
'nykøbing mors':[56.796,8.860],'fredericia':[55.566,9.753],'middelfart':[55.506,9.731],
'odense':[55.396,10.388],'ølgod':[55.809,8.613],'ansager':[55.750,8.583],
'vorbasse':[55.633,9.083],'hejnsvig':[55.683,9.067],'filskov':[55.850,8.833],
'tim':[56.150,8.250],'lem':[56.150,8.350],'spjald':[56.100,8.517],'stauning':[56.067,8.367],
'no':[56.083,8.567],'bording':[56.117,9.267],'engesvang':[56.133,9.317],'arnborg':[56.050,9.083],
'sdr. felding':[55.983,8.983],'lind':[56.133,8.933],'gjellerup':[56.150,8.933],
'hammerum':[56.150,8.950],'birk':[56.133,9.000],'snejbjerg':[56.133,8.917],'tjørring':[56.167,9.017],
'haderup':[56.350,8.917],'feldborg':[56.350,8.767],'sevel':[56.433,8.583],
'hjerm':[56.450,8.550],'bøvlingbjerg':[56.550,8.300],'harboøre':[56.617,8.183],
'gudum':[56.533,8.467],'møborg':[56.417,8.383],'husby':[56.217,8.183],
'vedersø':[56.233,8.233],'vemb':[56.350,8.367],'idom':[56.300,8.500],
'tvis':[56.350,8.550],'mejrup':[56.370,8.550],'bækmarksbro':[56.400,8.400],
'lomborg':[56.500,8.300],'ferring':[56.533,8.200],'sinding':[56.200,8.900],
'hee':[56.100,8.400],'stadil':[56.150,8.200],'dejbjerg':[55.983,8.433],
'borris':[55.950,8.650],'faster':[56.050,8.600],'velling':[56.050,8.367],
'hogager':[56.400,8.650],'naur':[56.400,8.500],'nees':[56.517,8.333],
'sdr. omme':[55.817,8.833],'hover':[55.917,8.467],'stakroge':[55.967,8.750],
'nordenskov':[55.700,8.617],'hoven':[55.883,8.667]
};

function geo(t){
  if(!t)return null;const l=t.toLowerCase();
  for(const[c,p]of Object.entries(C))if(l.includes(c)){const j=()=>(Math.random()-.5)*.005;return[p[0]+j(),p[1]+j()]}
  return null;
}

// ═══ STATUS ═══
const ST={
  active:{l:'I gang',c:'var(--ac)',cls:'mk-a',bc:'g'},
  planned:{l:'Planlagt',c:'var(--bl)',cls:'mk-p',bc:'b'},
  waiting:{l:'Afventer',c:'var(--w)',cls:'mk-w',bc:'y'},
  issue:{l:'Problem',c:'var(--r)',cls:'mk-i',bc:'r'},
};

// ═══ DEMO DATA — ~80 tasks across categories ═══
function demo(){
  const areas=['Holstebro','Herning','Lind','Snejbjerg','Vinderup','Hammerum','Ikast','Brande','Skjern','Tarm',
    'Ringkøbing','Lemvig','Thyborøn','Hvide Sande','Ulfborg','Struer','Skive','Viborg','Silkeborg','Vildbjerg',
    'Aulum','Kibæk','Videbæk','Sunds','Bording','Engesvang','Arnborg','Sdr. Felding','Tjørring','Birk',
    'Vemb','Bækmarksbro','Haderup','Feldborg','Sevel','Hjerm','Bøvlingbjerg','Harboøre','Stauning','Spjald',
    'Tim','Lem','No','Stadil','Vedersø','Borris','Faster','Velling','Hee','Dejbjerg',
    'Give','Billund','Grindsted','Varde','Esbjerg','Vejle','Kolding','Horsens','Aarhus','Randers',
    'Aalborg','Thisted','Nykøbing Mors','Fredericia','Mejrup','Idom','Tvis','Hogager','Naur','Nees',
    'Gudum','Møborg','Lomborg','Ferring','Sinding','Nordenskov','Hoven','Stakroge','Hover','Vorbasse'];
  const types=['Fiber-udrulning','Kabelskab','Tracé-gravning','Reparation','Tilslutning','Ombygning','Kabelfejl','Brønd-inspektion','Stikledning','Rørgennemtræk'];
  const sources=['DSO','DSO','DSO','Norlys','Norlys','BB','BB','Erhverv'];
  const statuses=['active','active','active','planned','planned','planned','waiting','issue'];
  const pms=['Lars N.','Peter H.','Mikkel S.','Anders J.','Søren K.','Thomas P.'];

  const tasks=[];
  for(let i=0;i<80;i++){
    const area=areas[i%areas.length];
    const type=types[Math.floor(Math.random()*types.length)];
    const src=sources[Math.floor(Math.random()*sources.length)];
    const st=statuses[Math.floor(Math.random()*statuses.length)];
    const pm=pms[Math.floor(Math.random()*pms.length)];
    const meter=Math.floor(Math.random()*12000+200);
    const dl=`2026-${String(Math.floor(Math.random()*9+4)).padStart(2,'0')}-${String(Math.floor(Math.random()*28+1)).padStart(2,'0')}`;
    const title=`${type} ${area}`;
    tasks.push({
      id:(title+'_'+src+'_'+i).replace(/\W+/g,'_').substring(0,50),
      title,address:area,status:st,source:src,
      coords:geo(area),
      meta:{Projektleder:pm,Deadline:dl,Meter:meter+'m',Område:area,Kilde:src}
    });
  }
  return tasks.filter(t=>t.coords);
}

// ═══ SHEET LOAD ═══
async function loadSheet(gid,src){
  const ctrl=new AbortController();
  setTimeout(()=>ctrl.abort(),3500);
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/1nAfna80c5NbT5mNhsXey84wu--DZVYct7NFRSRvTZr4/gviz/tq?tqx=out:json&gid=${gid}`,{signal:ctrl.signal});
    const txt=await r.text();
    const j=JSON.parse(txt.substring(47,txt.length-2));
    const h=j.table.cols.map(c=>c.label||'');
    return j.table.rows.map(row=>{
      const o={};row.c.forEach((c,i)=>{o[h[i]]=c?(c.v||''):''});
      const title=o['Projektnavn']||o['Projekt']||o['Opgave']||o['Navn']||o['Kunde']||Object.values(o).find(v=>typeof v==='string'&&v.length>3)||'?';
      const addr=o['Adresse']||o['By']||o['Område']||o['Lokation']||'';
      const sv=Object.values(o).join(' ').toLowerCase();
      let st='planned';
      if(/afsluttet|færdig|done|udført/.test(sv))st='done';
      else if(/problem|fejl|issue|stop/.test(sv))st='issue';
      else if(/venter|afvent|pending/.test(sv))st='waiting';
      else if(/igang|i gang|aktiv|start|igangsat/.test(sv))st='active';
      const meta={};Object.entries(o).forEach(([k,v])=>{if(v&&String(v).length>0&&String(v).length<120)meta[k]=String(v)});
      return{id:(String(title)+'_'+src).replace(/\W+/g,'_').substring(0,50),title:String(title),address:String(addr),status:st,source:src,coords:geo(addr)||geo(title)||geo(Object.values(o).join(' ')),meta};
    }).filter(t=>t.coords&&t.status!=='done'); // ← FILTER DONE
  }catch(e){return[]}
}

// ═══ FILTERING ═══
function filt(){
  // Never show done
  let t=ALL.filter(x=>{const s=gs(x.id).st||x.status;return s!=='done'});
  if(TAB!=='all')t=t.filter(x=>x.source===TAB);
  const q=(document.getElementById('sq')?.value||'').toLowerCase();
  if(q)t=t.filter(x=>x.title.toLowerCase().includes(q)||x.address.toLowerCase().includes(q));
  return t;
}

// ═══ DRAW ═══
function draw(){
  const tasks=filt();

  // Cluster markers
  cluster.clearLayers();
  tasks.forEach(t=>{
    if(!t.coords)return;
    const eff=gs(t.id).st||t.status;
    if(eff==='done')return;
    const cfg=ST[eff]||ST.planned;
    const icon=L.divIcon({className:'',html:`<div class="mk ${cfg.cls}"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
    const m=L.marker(t.coords,{icon}).on('click',()=>oModal(t));
    m.bindTooltip(`<b>${t.title}</b><br><span style="color:var(--t3)">${t.source} · ${cfg.l}</span>`,{className:'lt',direction:'top',offset:[0,-10]});
    cluster.addLayer(m);
  });

  // Sidebar
  const order={issue:0,active:1,waiting:2,planned:3};
  tasks.sort((a,b)=>(order[gs(a.id).st||a.status]??9)-(order[gs(b.id).st||b.status]??9));
  document.getElementById('scount').textContent=tasks.length+' opgaver';

  // Render only visible (virtual scroll light)
  const list=document.getElementById('slist');
  const html=[];
  const max=200; // render max 200 in DOM
  const show=tasks.slice(0,max);
  show.forEach(t=>{
    const eff=gs(t.id).st||t.status;
    const cfg=ST[eff]||ST.planned;
    html.push(`<div class="si" onclick="oModal(ALL.find(x=>x.id==='${t.id}'))"><div class="si-dot" style="background:${cfg.c}"></div><div class="si-info"><div class="si-t">${t.title}</div><div class="si-s">${cfg.l} · ${t.source} · ${t.address}</div></div></div>`);
  });
  if(tasks.length>max)html.push(`<div style="padding:8px;font-size:10px;color:var(--t3);text-align:center">+${tasks.length-max} flere — brug søg</div>`);
  list.innerHTML=html.join('');

  // Stats
  const cn={active:0,planned:0,waiting:0,issue:0};
  tasks.forEach(t=>cn[gs(t.id).st||t.status]++);
  document.getElementById('bstats').innerHTML=
    `<span><span class="sd" style="background:var(--ac)"></span>${cn.active}</span>`+
    `<span><span class="sd" style="background:var(--bl)"></span>${cn.planned}</span>`+
    `<span><span class="sd" style="background:var(--w)"></span>${cn.waiting}</span>`+
    `<span><span class="sd" style="background:var(--r)"></span>${cn.issue}</span>`+
    `<span style="color:var(--tx)">${tasks.length}</span>`;
}

// ═══ MODAL ═══
function oModal(task){
  if(!task)return;CUR=task;
  const d=gs(task.id);
  const eff=d.st||task.status;
  const cfg=ST[eff]||ST.planned;
  const me=Object.entries(task.meta||{}).filter(([k,v])=>v&&String(v).length<100).slice(0,6);
  const ck=(d.ck||[]).map((c,i)=>`<li class="${c.d?'dn':''}" onclick="tCk('${task.id}',${i})"><input type="checkbox" ${c.d?'checked':''} onclick="event.stopPropagation();tCk('${task.id}',${i})">${c.t}</li>`).join('');
  const lg=(d.lg||[]).slice().reverse().map(l=>`<div class="tl-e"><div class="tl-t">${l.t}</div><div class="tl-x">${l.x}</div></div>`).join('');

  document.getElementById('mopanel').innerHTML=`
<div class="mo-h">
  <div>
    <div class="mo-title">${task.title}</div>
    <div style="margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span class="mo-badge ${cfg.bc}">● ${cfg.l}</span>
      <span style="font:500 10px/1 'IBM Plex Sans';color:var(--t3)">${task.source} · 📍 ${task.address}</span>
    </div>
  </div>
  <button class="mo-x" onclick="cModal()">✕</button>
</div>
<div class="mo-b">
  <div class="mo-acts">
    <div class="mo-act" onclick="qAct('route')"><span>🗺</span><span>Rute</span></div>
    <div class="mo-act" onclick="qAct('mail')"><span>✉</span><span>Mail</span></div>
    <div class="mo-act" onclick="qAct('copy')"><span>📋</span><span>Kopiér</span></div>
    <div class="mo-act" onclick="qAct('maps')"><span>📍</span><span>Maps</span></div>
  </div>
  <div class="mo-tabs">
    <button class="mt on" onclick="sTab(this,'ti')">Info</button>
    <button class="mt" onclick="sTab(this,'tcl')">Tjekliste</button>
    <button class="mt" onclick="sTab(this,'tlg')">Log</button>
    <button class="mt" onclick="sTab(this,'tst')">Status</button>
  </div>
  <div class="tc on" id="ti">
    ${me.length?'<div class="mo-meta">'+me.map(([k,v])=>`<div class="mm"><div class="mm-l">${k}</div><div class="mm-v">${v}</div></div>`).join('')+'</div>':''}
    <div class="mo-lbl">Noter</div>
    <textarea class="mo-ta" id="ni" placeholder="Skriv noter...">${d.n||''}</textarea>
  </div>
  <div class="tc" id="tcl">
    <ul class="cl">${ck||'<li style="color:var(--t3);cursor:default;font-size:10px">Ingen punkter</li>'}</ul>
    <div class="cl-add">
      <input class="cl-inp" id="nci" placeholder="Nyt punkt..." onkeydown="if(event.key==='Enter')aCk('${task.id}')">
      <button class="cl-btn" onclick="aCk('${task.id}')">+</button>
    </div>
  </div>
  <div class="tc" id="tlg">
    <div class="tl">${lg||'<div style="color:var(--t3);font-size:10px;padding:4px 0">Ingen log endnu</div>'}</div>
    <div class="cl-add">
      <input class="cl-inp" id="nli" placeholder="Logpost..." onkeydown="if(event.key==='Enter')aLg('${task.id}')">
      <button class="cl-btn" onclick="aLg('${task.id}')">+</button>
    </div>
  </div>
  <div class="tc" id="tst">
    <div class="st-row">
      ${Object.entries(ST).map(([k,v])=>`<button class="st-o ${eff===k?'sel':''}" onclick="sSt('${task.id}','${k}',this)">${v.l}</button>`).join('')}
      <button class="st-o" style="color:var(--t3)" onclick="sSt('${task.id}','done',this)">✓ Afslut</button>
    </div>
  </div>
  <div class="mo-f">
    <button class="mo-btn mo-can" onclick="cModal()">Luk</button>
    <button class="mo-btn mo-save" onclick="svM('${task.id}')">Gem</button>
  </div>
</div>`;
  document.getElementById('mobg').classList.add('open');
  if(task.coords)map.flyTo(task.coords,13,{duration:.5});
}

function cModal(){document.getElementById('mobg').classList.remove('open');CUR=null}
function sTab(b,id){b.closest('.mo-tabs').querySelectorAll('.mt').forEach(x=>x.classList.remove('on'));b.classList.add('on');b.closest('.mo-b').querySelectorAll('.tc').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on')}
function svM(id){const d=gs(id);const el=document.getElementById('ni');if(el)d.n=el.value;sv();cModal();draw();toast('Gemt ✓')}
function tCk(id,i){const d=gs(id);d.ck[i].d=!d.ck[i].d;sv();if(CUR)oModal(CUR)}
function aCk(id){const inp=document.getElementById('nci');const t=inp.value.trim();if(!t)return;const d=gs(id);d.ck.push({t,d:false});aLE(id,'+ '+t);sv();inp.value='';oModal(CUR)}
function aLg(id){const inp=document.getElementById('nli');const t=inp.value.trim();if(!t)return;aLE(id,t);sv();inp.value='';oModal(CUR)}
function aLE(id,x){const d=gs(id);const n=new Date();d.lg.push({t:n.toLocaleDateString('da-DK',{day:'2-digit',month:'short'})+' '+n.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'}),x})}
function sSt(id,st,btn){const d=gs(id);d.st=st;aLE(id,'→ '+(ST[st]?.l||'Afsluttet'));sv();if(st==='done'){cModal();draw();toast('Opgave afsluttet');return}btn.closest('.st-row').querySelectorAll('.st-o').forEach(x=>x.classList.remove('sel'));btn.classList.add('sel');draw();toast(ST[st]?.l||'Afsluttet')}
function qAct(t){if(!CUR)return;const c=CUR;switch(t){case'route':if(c.coords)window.open(`https://www.google.com/maps/dir/?api=1&destination=${c.coords[0]},${c.coords[1]}`,'_blank');break;case'maps':if(c.coords)window.open(`https://www.google.com/maps/@${c.coords[0]},${c.coords[1]},15z`,'_blank');break;case'mail':window.open(`mailto:?subject=${encodeURIComponent('Vedr: '+c.title)}&body=${encodeURIComponent(c.title+'\n'+c.address+'\n')}`);break;case'copy':if(navigator.clipboard){navigator.clipboard.writeText(`${c.title} — ${c.address} (${(ST[gs(c.id).st||c.status]||{l:'?'}).l})`);toast('Kopieret')}break}}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000)}

// ═══ TABS ═══
document.querySelectorAll('.bar-tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.bar-tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');TAB=b.dataset.t;draw();
}));

// ═══ BOOT ═══
async function boot(){
  const ld=document.getElementById('ld');ld.classList.remove('out');ld.style.display='flex';
  if(!map){
    map=L.map('map',{center:[56.25,8.8],zoom:8,zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    cluster=L.markerClusterGroup({maxClusterRadius:45,spiderfyOnMaxZoom:true,showCoverageOnHover:false,disableClusteringAtZoom:13});
    map.addLayer(cluster);
  }
  ALL=[];
  for(const[gid,src]of[[0,'DSO'],[1905384837,'Norlys']]){
    const rows=await loadSheet(gid,src);ALL.push(...rows);
  }
  if(!ALL.length)ALL=demo();
  draw();
  setTimeout(()=>{ld.classList.add('out');setTimeout(()=>ld.style.display='none',300)},200);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')cModal();if(e.key==='/'&&!document.querySelector('.mo-bg.open')){e.preventDefault();document.getElementById('sq')?.focus()}});
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'})},5000);
document.getElementById('clk').textContent=new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
boot();
setInterval(boot,5*60000);
</script>
</body>
